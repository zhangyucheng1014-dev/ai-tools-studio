      def create():
          return jsonify({'ok': True, 'audio_url': 'mock'})
      app.run(host='0.0.0.0', port=8000)
      \""
    ports:
      - "8003:8000"
    restart: unless-stopped

  # ── 5. 视频制作 — MoneyPrinterTurbo ────────────
  money-printer:
    image: python:3.11-slim
    working_dir: /app
    command: >
      sh -c "pip install -q flask && python -c \"
