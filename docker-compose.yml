      @app.route('/api/video/render', methods=['POST'])
      def render():
          return jsonify({'ok': True, 'task_id': 'mock-render'})
      app.run(host='0.0.0.0', port=8000)
      \""
    ports:
      - "8005:8000"
    restart: unless-stopped

  # ── 6. 视频增强 — Real-ESRGAN ──────────────────
  video-enhancer:
    image: python:3.11-slim
    working_dir: /app
