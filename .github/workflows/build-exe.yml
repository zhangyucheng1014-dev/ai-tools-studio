name: 打包 Windows EXE

on:
  push:
    branches: [master, main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - run: npm install

      - run: npm run build

      - run: npx electron-builder --win --publish=never

      - uses: actions/upload-artifact@v4
        with:
          name: AI工具台-Windows
          path: release/*.exe
